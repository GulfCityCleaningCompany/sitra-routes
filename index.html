// layers
const route1Layer = L.geoJSON(route1, {style:{color:'red'}});
const route2Layer = L.geoJSON(route2, {style:{color:'blue'}});

route1Layer.addTo(map);
route2Layer.addTo(map);

let r1Visible = true;
let r2Visible = true;

// basemap switch (FIXED)
document.getElementById('osmBtn').onclick = function() {
  map.eachLayer(l => map.removeLayer(l));
  osm.addTo(map);
  if(r1Visible) route1Layer.addTo(map);
  if(r2Visible) route2Layer.addTo(map);
};

document.getElementById('satBtn').onclick = function() {
  map.eachLayer(l => map.removeLayer(l));
  sat.addTo(map);
  if(r1Visible) route1Layer.addTo(map);
  if(r2Visible) route2Layer.addTo(map);
};

// toggle (FIXED)
document.getElementById('r1').onclick = function() {
  this.classList.toggle('active');
  if(r1Visible) {
    map.removeLayer(route1Layer);
  } else {
    route1Layer.addTo(map);
  }
  r1Visible = !r1Visible;
};

document.getElementById('r2').onclick = function() {
  this.classList.toggle('active');
  if(r2Visible) {
    map.removeLayer(route2Layer);
  } else {
    route2Layer.addTo(map);
  }
  r2Visible = !r2Visible;
};

// fit bounds
const group = L.featureGroup([route1Layer, route2Layer]);
map.fitBounds(group.getBounds());
